<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/favicon.PNG">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Administration - GENESYS Admin</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { orange: '#FF6B2B', gold: '#C5A572', green: '#00A86B' }
          },
          fontFamily: {
            clash: ['Clash Display', 'sans-serif'],
            jakarta: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&display=swap');
    .lucide { display: inline-block; vertical-align: middle; }
    .hero-grid {
      background-image: radial-gradient(rgba(255,107,43,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    input { transition: all 0.25s ease; }
    input:focus { border-color: #FF6B2B !important; outline: none; box-shadow: 0 0 0 3px rgba(255,107,43,0.15); }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-jakarta antialiased min-h-screen flex flex-col justify-between hero-grid relative">

  <!-- LOGIN CARD -->
  <main class="w-full flex-1 flex items-center justify-center p-6 z-10">
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-8 shadow-2xl shadow-slate-200/80 relative overflow-hidden">
      <!-- Glow effect behind -->
      <div class="absolute -top-24 -left-24 w-48 h-48 bg-orange-100 rounded-full blur-3xl pointer-events-none opacity-60"></div>
      <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-amber-100 rounded-full blur-3xl pointer-events-none opacity-60"></div>

      <div class="relative z-10 flex flex-col items-center">
        <!-- Logo -->
        <a href="../index.html" class="mb-4 block bg-slate-900 rounded-xl px-4 py-2">
          <img src="assets/logo.PNG" alt="GENESYS Logo" class="h-9 w-auto">
        </a>
        <span class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold mb-6">G-PANEL LOGIN</span>

        <div class="text-center mb-8">
          <h1 class="font-clash text-2xl font-bold text-slate-900 mb-1">Espace Administratif</h1>
          <p class="text-xs text-slate-400">Veuillez vous authentifier pour accéder au tableau de bord</p>
        </div>

        <form class="w-full" onsubmit="handleAdminLogin(event)">
          <div class="mb-5">
            <label class="block text-xs text-slate-500 font-semibold mb-2 uppercase tracking-wide">Identifiant ou Email</label>
            <div class="relative">
              <input type="text" required placeholder="thierry.a" class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-3 text-sm text-slate-900 placeholder:text-slate-300 font-jakarta">
              <i data-lucide="user" class="w-4 h-4 text-slate-400 absolute left-3.5 top-3.5"></i>
            </div>
          </div>

          <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
              <label class="block text-xs text-slate-500 font-semibold uppercase tracking-wide">Mot de passe</label>
              <a href="#" class="text-xs text-brand-gold hover:underline">Mot de passe oublié ?</a>
            </div>
            <div class="relative">
              <input type="password" required placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-3 text-sm text-slate-900 placeholder:text-slate-300 font-jakarta">
              <i data-lucide="lock" class="w-4 h-4 text-slate-400 absolute left-3.5 top-3.5"></i>
            </div>
          </div>

          <div class="flex items-center justify-between mb-8">
            <label class="flex items-center gap-2 text-xs text-slate-400 cursor-pointer">
              <input type="checkbox" class="accent-brand-orange rounded border-slate-300 bg-white">
              <span>Session persistante (30 jours)</span>
            </label>
          </div>

          <button type="submit" class="w-full bg-gradient-to-r from-brand-orange to-orange-500 text-white font-bold py-3.5 rounded-lg text-sm hover:from-orange-600 hover:to-orange-600 transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-orange-200">
            Accéder au tableau de bord <i data-lucide="shield-check" class="w-4 h-4"></i>
          </button>
        </form>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="w-full py-6 text-center text-xs text-slate-400 z-10 border-t border-slate-200 bg-white/80">
    © 2026 GENESYS Admin — Lomé, Togo. Accès réservé aux administrateurs autorisés.
  </footer>

  <script>
    function handleAdminLogin(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    }
    
    lucide.createIcons();
  </script>
</body>
</html>
